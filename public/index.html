<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Panel PRO</title>
<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}
.container{
  max-width:900px;
  margin:auto;
  padding:40px;
}
.card{
  background:#1e293b;
  padding:25px;
  border-radius:12px;
  margin-bottom:20px;
  box-shadow:0 5px 20px rgba(0,0,0,0.3);
}
input{
  width:100%;
  padding:10px;
  margin:6px 0;
  border:none;
  border-radius:6px;
}
button{
  padding:10px 15px;
  background:#22c55e;
  border:none;
  border-radius:6px;
  cursor:pointer;
  font-weight:bold;
}
button:hover{background:#16a34a;}
.admin-btn{background:#ef4444;}
.admin-btn:hover{background:#dc2626;}
.hidden{display:none;}
table{
  width:100%;
  margin-top:15px;
  border-collapse:collapse;
}
td,th{
  padding:8px;
  border-bottom:1px solid #334155;
  text-align:left;
}
h1{color:#22c55e;}
</style>
</head>
<body>

<div class="container">

<h1>Admin Panel PRO 🚀</h1>

<div id="auth" class="card">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p>Default admin:<br>admin@admin.com / admin123</p>
</div>

<div id="panel" class="hidden">

<div class="card">
<h3>Dashboard</h3>
<p id="userinfo"></p>
<button onclick="logout()">Logout</button>
</div>

<div id="adminSection" class="card hidden">
<h3>All Users</h3>
<table id="usersTable">
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Role</th>
<th>Action</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>

</div>

<script>
function login(){
  fetch("/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:email.value,
      password:password.value
    })
  })
  .then(r=>r.json())
  .then(d=>{
    if(d.token){
      localStorage.setItem("token",d.token);
      loadPanel();
    }else{
      alert(JSON.stringify(d));
    }
  });
}

function loadPanel(){
  const token=localStorage.getItem("token");
  if(!token)return;

  fetch("/dashboard",{
    headers:{Authorization:"Bearer "+token}
  })
  .then(r=>r.json())
  .then(d=>{
    auth.classList.add("hidden");
    panel.classList.remove("hidden");
    userinfo.innerText="Role: "+d.user.role+" | ID: "+d.user.id;

    if(d.user.role==="admin"){
      adminSection.classList.remove("hidden");
      loadUsers();
    }
  });
}

function loadUsers(){
  const token=localStorage.getItem("token");
  fetch("/admin/users",{
    headers:{Authorization:"Bearer "+token}
  })
  .then(r=>r.json())
  .then(users=>{
    const tbody=document.querySelector("#usersTable tbody");
    tbody.innerHTML="";
    users.forEach(u=>{
      tbody.innerHTML+=`
      <tr>
        <td>${u.id}</td>
        <td>${u.name}</td>
        <td>${u.email}</td>
        <td>${u.role}</td>
        <td>
          <button class="admin-btn" onclick="deleteUser(${u.id})">
            Delete
          </button>
        </td>
      </tr>`;
    });
  });
}

function deleteUser(id){
  const token=localStorage.getItem("token");
  fetch("/admin/users/"+id,{
    method:"DELETE",
    headers:{Authorization:"Bearer "+token}
  })
  .then(r=>r.json())
  .then(()=>loadUsers());
}

function logout(){
  localStorage.removeItem("token");
  location.reload();
}

loadPanel();
</script>

</body>
</html>
