<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Админ</title>

<style>

body{
font-family:Arial;
background:#f4fff4;
margin:0;
}

header{
background:#2ecc71;
color:white;
padding:20px;
font-size:24px;
}

.container{
padding:30px;
max-width:500px;
margin:auto;
}

input,button{
padding:10px;
margin-top:10px;
width:100%;
font-size:16px;
}

button{
background:#2ecc71;
border:none;
color:white;
cursor:pointer;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<header>🔐 Админ панель</header>

<div class="container" id="login">

<h2>Вход</h2>

<input id="loginInput" placeholder="Логин">

<input id="passwordInput" type="password" placeholder="Пароль">

<button onclick="login()">Войти</button>

</div>

<div class="container hidden" id="panel">

<h2>Загрузить видео</h2>

<input id="title" placeholder="Название">

<input type="file" id="video">

<button onclick="upload()">Загрузить</button>

<h2>Видео</h2>

<div id="list"></div>

</div>

<script>

function login(){

fetch("/api/login",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
login:document.getElementById("loginInput").value,
password:document.getElementById("passwordInput").value
})
})
.then(r=>{

if(!r.ok){
alert("Неверный логин или пароль")
return
}

document.getElementById("login").style.display="none"
document.getElementById("panel").classList.remove("hidden")

load()

})

}

function upload(){

const title=document.getElementById("title").value
const file=document.getElementById("video").files[0]

const form=new FormData()

form.append("title",title)
form.append("video",file)

fetch("/api/upload",{
method:"POST",
body:form
})
.then(()=>load())

}

function load(){

fetch("/api/videos")
.then(r=>r.json())
.then(data=>{

const list=document.getElementById("list")
list.innerHTML=""

data.forEach(v=>{

const div=document.createElement("div")

div.innerHTML=`
<b>${v.title}</b>
<br>
<button onclick="del(${v.id})">Удалить</button>
<hr>
`

list.appendChild(div)

})

})

}

function del(id){

fetch("/api/video/"+id,{
method:"DELETE"
})
.then(()=>load())

}

</script>

</body>
</html>
