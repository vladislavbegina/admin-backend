<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admi Begins Video Chat</title>

<style>

body{
background:#0dbb55;
font-family:Arial;
text-align:center;
}

video{
width:300px;
background:black;
border-radius:10px;
margin:10px;
}

button{
padding:10px;
background:#0dbb55;
color:white;
border:none;
border-radius:5px;
font-size:16px;
}

</style>
</head>

<body>

<h2>Admi Begins Video Chat</h2>

<video id="localVideo" autoplay muted></video>
<video id="remoteVideo" autoplay></video>

<br><br>

<button onclick="startCall()">Начать звонок</button>

<script src="/socket.io/socket.io.js"></script>

<script>

const socket = io()

let localStream
let peerConnection

const localVideo = document.getElementById("localVideo")
const remoteVideo = document.getElementById("remoteVideo")

async function startCall(){

localStream = await navigator.mediaDevices.getUserMedia({video:true,audio:true})

localVideo.srcObject = localStream

peerConnection = new RTCPeerConnection()

localStream.getTracks().forEach(track=>{
peerConnection.addTrack(track,localStream)
})

peerConnection.ontrack = (event)=>{
remoteVideo.srcObject = event.streams[0]
}

peerConnection.onicecandidate = (event)=>{
if(event.candidate){
socket.emit("ice-candidate",{candidate:event.candidate,room:"room1"})
}
}

const offer = await peerConnection.createOffer()

await peerConnection.setLocalDescription(offer)

socket.emit("video-offer",{offer:offer,room:"room1"})

}

socket.on("video-offer",async(data)=>{

peerConnection = new RTCPeerConnection()

localStream = await navigator.mediaDevices.getUserMedia({video:true,audio:true})

localVideo.srcObject = localStream

localStream.getTracks().forEach(track=>{
peerConnection.addTrack(track,localStream)
})

peerConnection.ontrack = (event)=>{
remoteVideo.srcObject = event.streams[0]
}

await peerConnection.setRemoteDescription(new RTCSessionDescription(data.offer))

const answer = await peerConnection.createAnswer()

await peerConnection.setLocalDescription(answer)

socket.emit("video-answer",{answer:answer,room:"room1"})

})

socket.on("video-answer",async(data)=>{
await peerConnection.setRemoteDescription(new RTCSessionDescription(data.answer))
})

socket.on("ice-candidate",async(data)=>{
if(peerConnection){
await peerConnection.addIceCandidate(data.candidate)
}
})

socket.emit("join-video","room1")

</script>

</body>
</html>
